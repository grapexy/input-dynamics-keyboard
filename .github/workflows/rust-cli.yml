name: Rust CLI

on:
  pull_request:
    paths:
      - '.cargo/**'
      - '.github/workflows/rust-cli.yml'
      - 'Cargo.lock'
      - 'Cargo.toml'
      - 'cli/**'
      - 'clippy.toml'
      - 'crates/**'
      - 'docs/**'
      - 'flake.nix'
      - 'README.md'
      - 'skills/input-dynamics-keyboard/**'
  workflow_dispatch:

jobs:
  rust:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@1.85.0
        with:
          components: clippy,rustfmt

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo ci-fmt

      - name: Test
        run: cargo ci-test

      - name: Clippy
        run: cargo ci-clippy
